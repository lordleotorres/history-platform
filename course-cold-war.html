<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lesson 1 - Origins of the Cold War</title>

<style>
body {
  font-family: Inter, sans-serif;
  margin: 0;
  background: #f7f3ea;
  color: #1f2a44;
}

.container {
  max-width: 900px;
  margin: auto;
  padding: 40px 20px;
}

h1 {
  font-size: 2.4rem;
  margin-bottom: 10px;
}

.section {
  background: white;
  padding: 20px;
  border-radius: 12px;
  margin-top: 25px;
  border: 1px solid #ddd;
}

.section h2 {
  margin-top: 0;
}

input {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 15px;
  border-radius: 6px;
  border: 1px solid #ccc;
}

button {
  padding: 12px 20px;
  background: #2f5b95;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  font-weight: bold;
}
</style>

</head>

<body>

<div class="container">

<h1>Lesson 1: Origins of the Cold War</h1>

<p>
Today we explore why the Cold War began after World War II.
</p>

<!-- VIDEO SECTION -->
<div class="section">
<h2>Watch</h2>

<iframe width="100%" height="400"
src="https://www.youtube.com/embed/9C72ISMF_D0"
frameborder="0" allowfullscreen></iframe>

</div>

<!-- GUIDED NOTES -->
<div class="section">
<h2>Guided Notes</h2>

<p>Fill this out as you watch the video.</p>

<label>1. The Cold War was a conflict between the United States and the ______ Union.</label>
<input type="text" id="q1">

<label>2. The U.S. believed in capitalism, while the USSR believed in ______.</label>
<input type="text" id="q2">

<label>3. One major cause of tension was lack of ______ between the two sides.</label>
<input type="text" id="q3">

</div>

<!-- CHECK FOR UNDERSTANDING -->
<div class="section">
<h2>Check for Understanding</h2>

<p>Answer the questions below.</p>

<label>Why did the U.S. fear the spread of communism?</label>
<input type="text" id="q4">

<label>What was one major difference between the U.S. and USSR?</label>
<input type="text" id="q5">

<button onclick="checkAnswers()">Submit</button>

<div class="result" id="result"></div>

</div>

</div>

<script>
function checkAnswers() {
  let score = 0;

  if (document.getElementById("q1").value.toLowerCase().includes("soviet")) score++;
  if (document.getElementById("q2").value.toLowerCase().includes("communism")) score++;
  if (document.getElementById("q3").value.toLowerCase().includes("trust")) score++;

  document.getElementById("result").innerText =
    "You got " + score + " out of 3 correct.";
}
</script>

</body>
</html>
