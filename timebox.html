<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Historical TimeBox | Historia</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
  <style>
    :root{
      --navy:#0d1b2a;
      --navy-soft:#13263a;
      --navy-deep:#08131f;
      --gold:#c8a96b;
      --gold-soft:#e3d3af;
      --paper:#f5f7fb;
      --paper-2:#e9eef5;
      --ink:#1e2935;
      --muted:#5f6b78;
      --line:rgba(13,27,42,0.10);
      --shadow:0 22px 60px rgba(7,16,26,0.12);
      --radius:22px;
    }

    * { box-sizing: border-box; }

    body{
      margin:0;
      font-family:"Inter", sans-serif;
      color:var(--ink);
      background:
        radial-gradient(circle at top left, rgba(200,169,107,0.10), transparent 30%),
        linear-gradient(180deg, #eef3f9 0%, #e6edf6 100%);
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 28px;
      background:linear-gradient(135deg, rgba(13,27,42,0.98), rgba(19,38,58,0.94));
      color:white;
      border-bottom:1px solid rgba(200,169,107,0.18);
    }

    .brand-block{
      display:flex;
      flex-direction:column;
      gap:4px;
    }

    .brand-title{
      font-family:"Playfair Display", serif;
      font-size:1.9rem;
      color:var(--gold);
    }

    .brand-sub{
      color:rgba(255,255,255,0.75);
      font-size:0.92rem;
    }

    .topbar a{
      color:white;
      text-decoration:none;
      padding:10px 14px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,0.08);
      background:rgba(255,255,255,0.05);
    }

    .page{
      padding:28px;
      max-width:1500px;
      margin:0 auto;
    }

    .hero{
      background:linear-gradient(135deg, rgba(13,27,42,0.98), rgba(19,38,58,0.93));
      color:white;
      border-radius:28px;
      padding:32px;
      box-shadow:var(--shadow);
      border:1px solid rgba(200,169,107,0.18);
      margin-bottom:24px;
    }

    .eyebrow{
      text-transform:uppercase;
      letter-spacing:0.2em;
      font-size:0.72rem;
      color:var(--gold-soft);
      margin-bottom:12px;
      font-weight:700;
    }

    .hero h1{
      margin:0;
      font-family:"Playfair Display", serif;
      font-size:clamp(2rem, 4vw, 3.3rem);
      line-height:1.03;
      color:var(--gold-soft);
    }

    .hero p{
      margin:16px 0 0;
      max-width:860px;
      line-height:1.7;
      color:rgba(255,255,255,0.85);
      font-size:1rem;
    }

    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      align-items:center;
      justify-content:space-between;
      background:rgba(255,255,255,0.94);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px 20px;
      margin-bottom:22px;
      box-shadow:0 14px 34px rgba(16,24,32,0.06);
    }

    .toolbar-left{
      display:flex;
      flex-wrap:wrap;
      gap:14px;
      align-items:center;
    }

    .toolbar label{
      font-weight:600;
      color:var(--navy);
    }

    select{
      padding:10px 12px;
      border-radius:12px;
      border:1px solid rgba(13,27,42,0.14);
      background:white;
      font:inherit;
      color:var(--ink);
    }

    .legend{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
    }

    .legend-item{
      display:inline-flex;
      align-items:center;
      gap:8px;
      padding:8px 10px;
      border-radius:999px;
      border:1px solid rgba(13,27,42,0.08);
      background:#fff;
      color:var(--muted);
      font-size:0.86rem;
    }

    .legend-dot{
      width:10px;
      height:10px;
      border-radius:50%;
      display:inline-block;
    }

    .layout{
      display:grid;
      grid-template-columns:1.55fr 0.85fr;
      gap:24px;
      align-items:start;
    }

    .grid-panel,
    .side-panel{
      background:rgba(255,255,255,0.94);
      border:1px solid var(--line);
      border-radius:24px;
      padding:24px;
      box-shadow:0 14px 34px rgba(16,24,32,0.06);
    }

    .panel-heading{
      display:flex;
      justify-content:space-between;
      gap:14px;
      align-items:flex-start;
      margin-bottom:16px;
    }

    .panel-heading h2{
      margin:0;
      font-family:"Playfair Display", serif;
      color:var(--navy);
      font-size:1.8rem;
    }

    .panel-heading p{
      margin:0;
      color:var(--muted);
      line-height:1.6;
      font-size:0.95rem;
      max-width:720px;
    }

    .timebox-grid{
      display:grid;
      grid-template-columns:repeat(10, minmax(68px, 1fr));
      gap:8px;
    }

    .year-box{
      position:relative;
      aspect-ratio:1 / 1;
      border-radius:16px;
      border:1px solid rgba(13,27,42,0.10);
      background:linear-gradient(180deg, #ffffff 0%, #eef3f9 100%);
      padding:10px;
      cursor:pointer;
      transition:0.2s ease;
      overflow:hidden;
    }

    .year-box:hover,
    .year-box.active{
      transform:translateY(-3px);
      border-color:rgba(200,169,107,0.55);
      box-shadow:0 12px 24px rgba(16,24,32,0.10);
      background:linear-gradient(180deg, #ffffff 0%, #e7eef7 100%);
    }

    .year-num{
      position:absolute;
      top:10px;
      left:10px;
      font-size:0.8rem;
      color:#5f6b78;
      font-weight:700;
      z-index:2;
    }

    .span-overlay{
      position:absolute;
      inset:0;
      opacity:0.16;
      pointer-events:none;
    }

    .badge-cluster{
      position:absolute;
      right:8px;
      bottom:8px;
      display:flex;
      flex-wrap:wrap;
      gap:4px;
      width:36px;
      justify-content:flex-end;
      z-index:2;
    }

    .badge-dot{
      width:8px;
      height:8px;
      border-radius:50%;
      border:1px solid rgba(0,0,0,0.08);
    }

    .year-status{
      position:absolute;
      left:10px;
      bottom:10px;
      font-size:0.68rem;
      color:#5f6b78;
      background:rgba(13,27,42,0.06);
      padding:4px 7px;
      border-radius:999px;
      font-weight:700;
      z-index:2;
    }

    .selected-year{
      margin-bottom:16px;
    }

    .selected-year .label{
      text-transform:uppercase;
      letter-spacing:0.18em;
      font-size:0.72rem;
      color:#8c6d38;
      font-weight:700;
      margin-bottom:8px;
    }

    .selected-year h3{
      margin:0;
      font-family:"Playfair Display", serif;
      font-size:2rem;
      color:var(--navy);
    }

    .selected-year p{
      margin:10px 0 0;
      color:var(--muted);
      line-height:1.6;
      font-size:0.95rem;
    }

    .category-grid{
      display:grid;
      gap:12px;
    }

    .category-card{
      border:1px solid rgba(13,27,42,0.10);
      border-radius:18px;
      background:linear-gradient(180deg, #ffffff 0%, #f4f7fb 100%);
      padding:14px;
    }

    .category-card h4{
      margin:0 0 6px;
      color:var(--navy);
      font-size:1rem;
    }

    .category-card p{
      margin:0 0 10px;
      color:var(--muted);
      font-size:0.88rem;
      line-height:1.5;
    }

    .category-card input{
      width:100%;
      border:1px solid rgba(13,27,42,0.12);
      border-radius:12px;
      background:white;
      font:inherit;
      color:var(--ink);
      padding:10px 12px;
      margin-top:8px;
    }

    .category-card textarea{
      width:100%;
      border:1px solid rgba(13,27,42,0.12);
      border-radius:12px;
      background:white;
      font:inherit;
      color:var(--ink);
      padding:10px 12px;
      margin-top:8px;
      min-height:64px;
      resize:vertical;
    }

    .span-entry-list{
      display:grid;
      gap:8px;
      margin-top:10px;
    }

    .span-entry{
      border:1px solid rgba(13,27,42,0.08);
      border-left:4px solid var(--gold);
      border-radius:14px;
      background:#fff;
      padding:10px 12px;
    }

    .span-entry strong{
      display:block;
      color:var(--navy);
      font-size:0.93rem;
      margin-bottom:4px;
    }

    .span-entry span{
      color:var(--muted);
      font-size:0.84rem;
      line-height:1.5;
      display:block;
    }

    .span-fields{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:8px;
      margin-top:8px;
    }

    .actions{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:18px;
    }

    .btn,
    .btn-secondary{
      border:none;
      border-radius:14px;
      padding:12px 14px;
      font:inherit;
      font-weight:600;
      cursor:pointer;
      transition:0.2s ease;
    }

    .btn{
      background:var(--navy);
      color:white;
    }

    .btn:hover{
      background:#12253a;
      transform:translateY(-1px);
    }

    .btn-secondary{
      background:transparent;
      color:var(--navy);
      border:1px solid rgba(13,27,42,0.16);
    }

    .btn-secondary:hover{
      background:#edf3fb;
    }

    .helper-note{
      margin-top:16px;
      border:1px dashed rgba(13,27,42,0.16);
      border-radius:18px;
      padding:14px;
      background:rgba(244,247,251,0.9);
      color:var(--muted);
      line-height:1.6;
      font-size:0.9rem;
    }

    .c-events{ background:#d9534f; }
    .c-people{ background:#4f79d9; }
    .c-places{ background:#31a56f; }
    .c-ideas{ background:#8b5cf6; }
    .c-culture{ background:#c8a96b; }
    .c-tech{ background:#169bb1; }

    .overlay-events{ background:#d9534f; }
    .overlay-people{ background:#4f79d9; }
    .overlay-places{ background:#31a56f; }
    .overlay-ideas{ background:#8b5cf6; }
    .overlay-culture{ background:#c8a96b; }
    .overlay-tech{ background:#169bb1; }

    @media (max-width: 1180px){
      .layout{
        grid-template-columns:1fr;
      }
    }

    @media (max-width: 760px){
      .page{
        padding:18px;
      }

      .toolbar{
        align-items:flex-start;
      }

      .timebox-grid{
        grid-template-columns:repeat(5, minmax(64px, 1fr));
      }

      .span-fields{
        grid-template-columns:1fr;
      }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="brand-title">Historia</div>
  <div>TimeBox</div>
</div>

<div class="container">
  <div class="header">
    <h1>Historical TimeBox</h1>
    <p>Click a year to explore layered historical thinking.</p>
  </div>

  <div class="layout">
    <div class="grid" id="grid"></div>

    <div class="panel">
      <h2 id="yearTitle">Select a Year</h2>
      <p id="yearDesc">Click any year to begin.</p>

      <div class="tags" id="tags"></div>

      <div id="events"></div>
    </div>
  </div>
</div>

<script>
const data = {
  1914:{
    desc:"Start of World War I.",
    tags:["War","Europe","Nationalism"],
    events:["Assassination of Franz Ferdinand","WWI begins"]
  },
  1945:{
    desc:"End of WWII and start of new world order.",
    tags:["WWII","UN","Atomic Age"],
    events:["Germany surrenders","Atomic bombs dropped"]
  }
};

const grid = document.getElementById('grid');

for(let i=1900;i<2000;i++){
  const box=document.createElement('div');
  box.className='year-box';
  box.innerHTML=`<div class='year-label'>${i}</div>`;
  box.onclick=()=>openYear(i);
  grid.appendChild(box);
}

function openYear(year){
  const d=data[year]||{desc:"Add student data.",tags:[],events:[]};
  document.getElementById('yearTitle').textContent=year;
  document.getElementById('yearDesc').textContent=d.desc;

  const tagsDiv=document.getElementById('tags');
  tagsDiv.innerHTML='';
  d.tags.forEach(t=>{
    const el=document.createElement('div');
    el.className='tag';
    el.textContent=t;
    tagsDiv.appendChild(el);
  });

  const eventsDiv=document.getElementById('events');
  eventsDiv.innerHTML='';
  d.events.forEach(e=>{
    const el=document.createElement('div');
    el.className='event';
    el.textContent=e;
    eventsDiv.appendChild(el);
  });
}
</script>

</body>
</html>
