<script>
  const countryData = [
    { name: "United States", bucket: "nato", onMap: false },
    { name: "Canada", bucket: "nato", onMap: false },
    { name: "United Kingdom", bucket: "nato", onMap: true, svgId: "gb" },
    { name: "France", bucket: "nato", onMap: true, svgId: "fr" },
    { name: "Belgium", bucket: "nato", onMap: true, svgId: "be" },
    { name: "Netherlands", bucket: "nato", onMap: true, svgId: "nl" },
    { name: "Luxembourg", bucket: "nato", onMap: true, svgId: "lu" },
    { name: "Italy", bucket: "nato", onMap: true, svgId: "it" },
    { name: "Denmark", bucket: "nato", onMap: true, svgId: "dk" },
    { name: "Norway", bucket: "nato", onMap: true, svgId: "no" },
    { name: "Portugal", bucket: "nato", onMap: true, svgId: "pt" },
    { name: "West Germany", bucket: "nato", onMap: false },

    { name: "Soviet Union", bucket: "warsaw", onMap: false },
    { name: "East Germany", bucket: "warsaw", onMap: false },
    { name: "Poland", bucket: "warsaw", onMap: true, svgId: "pl" },
    { name: "Czechoslovakia", bucket: "warsaw", onMap: false },
    { name: "Hungary", bucket: "warsaw", onMap: true, svgId: "hu" },
    { name: "Romania", bucket: "warsaw", onMap: true, svgId: "ro" },
    { name: "Bulgaria", bucket: "warsaw", onMap: true, svgId: "bg" },
    { name: "Albania", bucket: "warsaw", onMap: true, svgId: "al" },

    { name: "Austria", bucket: "neutral", onMap: true, svgId: "at" },
    { name: "Switzerland", bucket: "neutral", onMap: true, svgId: "ch" },
    { name: "Sweden", bucket: "neutral", onMap: true, svgId: "se" },
    { name: "Finland", bucket: "neutral", onMap: true, svgId: "fi" },
    { name: "Yugoslavia", bucket: "neutral", onMap: false },
    { name: "Ireland", bucket: "neutral", onMap: true, svgId: "ie" },
    { name: "Spain", bucket: "neutral", onMap: true, svgId: "es" }
  ];

  const paletteColors = {
    nato: "#4a90e2",
    warsaw: "#e05a5a",
    neutral: "#8b8f97"
  };

  let selectedMode = "nato";
  let svgDoc = null;
  let activeMapIds = {};

  const countryBank = document.getElementById("country-bank");
  const dropZones = document.querySelectorAll(".drop-zone");
  const paletteButtons = document.querySelectorAll(".palette-btn");
  const checkBtn = document.getElementById("check-btn");
  const resetBtn = document.getElementById("reset-btn");
  const resultsBox = document.getElementById("results");
  const reflectionSection = document.getElementById("reflection-section");
  const svgObject = document.getElementById("europe-map");

  function shuffleArray(arr) {
    const copy = [...arr];
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [copy[i], copy[j]] = [copy[j], copy[i]];
    }
    return copy;
  }

  function cssEscape(str) {
    return str.replace(/["\\]/g, "\\$&");
  }

  function buildCountryCards() {
    countryBank.innerHTML = "";
    const shuffled = shuffleArray(countryData);

    shuffled.forEach(country => {
      const el = document.createElement("div");
      el.className = "country-card";
      el.textContent = country.name;
      el.draggable = true;
      el.dataset.name = country.name;

      el.addEventListener("dragstart", e => {
        e.dataTransfer.setData("text/plain", country.name);
      });

      countryBank.appendChild(el);
    });
  }

  dropZones.forEach(zone => {
    zone.addEventListener("dragover", e => {
      e.preventDefault();
      zone.classList.add("drag-over");
    });

    zone.addEventListener("dragleave", () => {
      zone.classList.remove("drag-over");
    });

    zone.addEventListener("drop", e => {
      e.preventDefault();
      zone.classList.remove("drag-over");
      const countryName = e.dataTransfer.getData("text/plain");
      const card = document.querySelector(`.country-card[data-name="${cssEscape(countryName)}"]`);
      if (card) zone.appendChild(card);
    });
  });

  countryBank.addEventListener("dragover", e => {
    e.preventDefault();
  });

  countryBank.addEventListener("drop", e => {
    e.preventDefault();
    const countryName = e.dataTransfer.getData("text/plain");
    const card = document.querySelector(`.country-card[data-name="${cssEscape(countryName)}"]`);
    if (card) countryBank.appendChild(card);
  });

  paletteButtons.forEach(btn => {
    btn.addEventListener("click", () => {
      paletteButtons.forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      selectedMode = btn.dataset.mode;
    });
  });

  function normalize(str) {
    return (str || "").toLowerCase().replace(/[\s_\-]/g, "");
  }

  function getPossibleIds(baseId) {
    return [
      baseId,
      baseId.toUpperCase(),
      baseId.toLowerCase(),
      normalize(baseId)
    ];
  }

  function findCountryNodeByIdGuess(country) {
    if (!svgDoc) return null;

    const guesses = getPossibleIds(country.svgId);

    for (const guess of guesses) {
      let found = svgDoc.getElementById(guess);
      if (found) return found;

      found = svgDoc.querySelector(`[id="${guess}"]`);
      if (found) return found;
    }

    return null;
  }

  function getCountryTarget(node) {
    if (!node) return null;

    if (node.tagName && (node.tagName.toLowerCase() === "path" || node.tagName.toLowerCase() === "g")) {
      return node;
    }

    const pathChild = node.querySelector("path");
    return pathChild || node;
  }

  function colorCountryNode(node, bucket) {
    if (!node) return;

    const fillColor = paletteColors[bucket];

    if (node.tagName && node.tagName.toLowerCase() === "g") {
      node.querySelectorAll("path").forEach(path => {
        path.style.fill = fillColor;
      });
    } else {
      node.style.fill = fillColor;
    }
  }

  function resetCountryNode(node) {
    if (!node) return;

    if (node.tagName && node.tagName.toLowerCase() === "g") {
      node.querySelectorAll("path").forEach(path => {
        path.style.fill = "#d0d3d8";
      });
    } else {
      node.style.fill = "#d0d3d8";
    }
  }

  function ensureDebugBox() {
    let debugBox = document.getElementById("map-debug-box");
    if (!debugBox) {
      debugBox = document.createElement("div");
      debugBox.id = "map-debug-box";
      debugBox.style.marginTop = "14px";
      debugBox.style.padding = "12px";
      debugBox.style.borderRadius = "12px";
      debugBox.style.background = "#f3f4f6";
      debugBox.style.border = "1px solid #dbe4ef";
      debugBox.style.color = "#475569";
      debugBox.style.fontSize = "0.92rem";
      debugBox.innerHTML = "<strong>Map debug:</strong> Click a country to see its SVG id.";
      document.querySelector(".map-wrapper").after(debugBox);
    }
    return debugBox;
  }

  function wireMap() {
    if (!svgDoc) return;

    const debugBox = ensureDebugBox();

    svgDoc.querySelectorAll("path, g").forEach(node => {
      node.style.cursor = "pointer";

      node.addEventListener("click", event => {
        event.stopPropagation();

        const clickedId = node.id || "(no id)";
        debugBox.innerHTML = `<strong>Map debug:</strong> You clicked SVG id = ${clickedId}`;

        const matchedCountry = countryData.find(c => c.onMap && normalize(c.svgId) === normalize(clickedId));

        if (matchedCountry) {
          activeMapIds[matchedCountry.svgId] = selectedMode;
          colorCountryNode(node, selectedMode);
        }
      });
    });

    countryData.filter(c => c.onMap).forEach(country => {
      const node = findCountryNodeByIdGuess(country);
      if (node) {
        node.style.cursor = "pointer";
      }
    });
  }

  svgObject.addEventListener("load", () => {
    svgDoc = svgObject.contentDocument;
    if (!svgDoc) return;

    svgDoc.querySelectorAll("path").forEach(path => {
      if (!path.style.fill || path.style.fill === "") {
        path.style.fill = "#d0d3d8";
      }
      path.style.stroke = "#ffffff";
      path.style.strokeWidth = "1";
      path.style.pointerEvents = "all";
    });

    wireMap();
  });

  function getSortingScore() {
    let correct = 0;
    let total = countryData.length;

    countryData.forEach(country => {
      const card = document.querySelector(`.country-card[data-name="${cssEscape(country.name)}"]`);
      if (!card) return;

      const parentZone = card.parentElement;
      if (parentZone && parentZone.dataset && parentZone.dataset.bucket === country.bucket) {
        correct++;
      }
    });

    return { correct, total };
  }

  function getMapScore() {
    const mapCountries = countryData.filter(c => c.onMap);
    let correct = 0;
    const total = mapCountries.length;

    mapCountries.forEach(country => {
      if (activeMapIds[country.svgId] === country.bucket) {
        correct++;
      }
    });

    return { correct, total };
  }

  function listMissedSorting() {
    const missed = [];
    countryData.forEach(country => {
      const card = document.querySelector(`.country-card[data-name="${cssEscape(country.name)}"]`);
      if (!card) return;
      const parentZone = card.parentElement;
      const placed = parentZone && parentZone.dataset ? parentZone.dataset.bucket : "bank";
      if (placed !== country.bucket) {
        missed.push(`${country.name} → ${labelBucket(country.bucket)}`);
      }
    });
    return missed;
  }

  function listMissedMap() {
    const missed = [];
    countryData.filter(c => c.onMap).forEach(country => {
      const placed = activeMapIds[country.svgId] || "uncolored";
      if (placed !== country.bucket) {
        missed.push(`${country.name} → ${labelBucket(country.bucket)} (svg id expected: ${country.svgId})`);
      }
    });
    return missed;
  }

  function labelBucket(bucket) {
    if (bucket === "nato") return "NATO";
    if (bucket === "warsaw") return "Warsaw Pact";
    return "Neutral / Other";
  }

  checkBtn.addEventListener("click", () => {
    const sorting = getSortingScore();
    const mapping = getMapScore();
    const totalCorrect = sorting.correct + mapping.correct;
    const totalPossible = sorting.total + mapping.total;

    const missedSorting = listMissedSorting();
    const missedMap = listMissedMap();

    resultsBox.classList.remove("hidden");
    reflectionSection.classList.remove("hidden");

    resultsBox.innerHTML = `
      <strong>Score: ${totalCorrect} / ${totalPossible}</strong>
      <div class="results-detail">
        Sorting: ${sorting.correct} / ${sorting.total}<br>
        Map: ${mapping.correct} / ${mapping.total}<br><br>
        <strong>Missed in sorting:</strong><br>
        ${missedSorting.length ? missedSorting.join("<br>") : "None"}<br><br>
        <strong>Missed on map:</strong><br>
        ${missedMap.length ? missedMap.join("<br>") : "None"}
      </div>
    `;
  });

  resetBtn.addEventListener("click", () => {
    activeMapIds = {};
    resultsBox.classList.add("hidden");
    reflectionSection.classList.add("hidden");
    resultsBox.innerHTML = "";
    buildCountryCards();

    dropZones.forEach(zone => {
      zone.innerHTML = "";
    });

    if (svgDoc) {
      countryData.filter(c => c.onMap).forEach(country => {
        const node = findCountryNodeByIdGuess(country);
        if (node) {
          resetCountryNode(node);
        }
      });
    }

    const debugBox = document.getElementById("map-debug-box");
    if (debugBox) {
      debugBox.innerHTML = "<strong>Map debug:</strong> Click a country to see its SVG id.";
    }
  });

  buildCountryCards();
</script>
