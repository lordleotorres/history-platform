<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>History Platform</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      text-align: center;
    }
    .container {
      padding: 80px 20px;
    }
    h1 {
      font-size: 3rem;
      margin-bottom: 10px;
    }
    p {
      font-size: 1.2rem;
      color: #94a3b8;
    }
    .button {
      margin-top: 30px;
      padding: 12px 24px;
      background: #6366f1;
      border: none;
      border-radius: 8px;
      color: white;
      font-size: 1rem;
      cursor: pointer;
    }
    .button:hover {
      background: #4f46e5;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>History Learning Platform</h1>
    <p>AI-powered learning for Government and World Geography</p>
    <button class="button">Start Learning</button>
  </div>
</body>
</html>
