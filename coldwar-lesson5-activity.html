<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link rel="stylesheet" href="styles.css"/>

  <style>
    .page-wrapper {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }

    .doc-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 30px;
    }

    .doc-card {
      background: #ffffff;
      border-radius: 16px;
      padding: 16px;
      border: 1px solid #e5e7eb;
    }

    .doc-card img {
      width: 100%;
      border-radius: 10px;
      margin-bottom: 12px;
    }

    .doc-meta {
      font-size: 0.9rem;
      color: #6b7280;
      margin-bottom: 10px;
    }

    .doc-excerpt {
      background: #f8fafc;
      padding: 10px;
      border-radius: 10px;
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      min-height: 90px;
      border-radius: 10px;
      border: 1px solid #d1d5db;
      padding: 10px;
    }

    @media (max-width: 900px) {
      .doc-grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
